<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOYCE - Logbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #6366f1;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #334155;
      --primary: #818cf8;
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .card {
      background: var(--card);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      transition: background 0.3s ease;
    }

    h1 {
      margin-top: 0;
      font-weight: 600;
      font-size: 1.6rem;
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .toggle {
      cursor: pointer;
      font-size: 0.8rem;
      background: var(--border);
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
    }

    .form-group {
      margin-bottom: 1.2rem;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: var(--muted);
    }

    input, select, textarea {
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      background: transparent;
      color: var(--text);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    textarea {
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 0.75rem;
    }

    .row .form-group {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 1rem;
      font-size: 0.75rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="top-bar">
      <h1>JOYCE Logbook</h1>
      <div class="toggle" onclick="toggleDarkMode()">🌙 Toggle</div>
    </div>

    <form method="post">

      <div class="form-group">
        <label for="code">Code</label>
        <input required type="text" name="code" id="code" placeholder="Enter code" />
      </div>

      <div class="row">
        <div class="form-group">
          <label for="date">Date</label>
          <input required type="date" name="date" id="date" />
        </div>

        <div class="form-group">
          <label for="time">Time UTC</label>
          <input required type="time" name="time" id="time" />
        </div>
      </div>

      <div class="form-group">
        <label for="operator">Operator</label>
        <select required name="operator" id="operator">
          <option value="">Select operator...</option>
          {% for item in team %}
            <option value="{{ item }}">{{ item }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="instrument">Instrument</label>
        <select required name="instrument" id="instrument">
          <option value="">Select instrument...</option>
          {% for item in instruments %}
            <option value="{{ item }}">{{ item }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="event-type">Event Type</label>
        <select required name="event-type" id="event-type">
          <option value="">Select event type...</option>
          <option value="calibration">Calibration</option>
          <!--<option value="check">Check</option>-->
          <option value="installation">Installation</option>
          <option value="maintenance">Maintenance</option>
          <option value="malfunction">Malfunction</option>
          <option value="note">Note</option>
          <option value="removal">Removal</option>
        </select>
      </div>

      <div class="form-group">
        <label for="event-notes">Notes</label>
        <textarea name="event-notes" id="event-notes" rows="5" placeholder="Write notes..."></textarea>
      </div>

      <button type="submit">Submit Entry</button>

    </form>

    <div class="footer">ExOb Team, 2026</div>
  </div>

  <script>
    // Auto-fill current date and time
    const now = new Date();

    const dateInput = document.getElementById('date');
    const timeInput = document.getElementById('time');

    const yyyy = now.getUTCFullYear();
    const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(now.getUTCDate()).padStart(2, '0');

    const hh = String(now.getUTCHours()).padStart(2, '0');
    const min = String(now.getUTCMinutes()).padStart(2, '0');

    dateInput.value = `${yyyy}-${mm}-${dd}`;
    timeInput.value = `${hh}:${min}`;

    // Dark mode toggle
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    // Load saved mode
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
